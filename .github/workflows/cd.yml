name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: product_intelligence_bot
  ECS_CLUSTER: product_cluster_new_version
  ECS_SERVICE: product-service
  CONTAINER_NAME: product-intelligence-app
  TASK_FAMILY: product-intelligence-task
  SUBNET_ID: subnet-0c2b441441cd36d42
  SECURITY_GROUP_ID: sg-02c423f0c70eb33ef
  LOG_GROUP: /ecs/product-intelligence-bot
  AWS_ACCOUNT_ID: 630889618892

jobs:
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Ensure log group exists
        run: |
          aws logs create-log-group \
            --log-group-name ${{ env.LOG_GROUP }} \
            --region ${{ env.AWS_REGION }} || echo "Log group already exists"

      - name: Register new task definition
        id: register-task
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs register-task-definition \
            --family ${{ env.TASK_FAMILY }} \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 256 \
            --memory 512 \
            --execution-role-arn arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole \
            --task-role-arn arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole \
            --container-definitions "[{
              \"name\": \"${{ env.CONTAINER_NAME }}\",
              \"image\": \"$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG\",
              \"portMappings\": [{\"containerPort\": 8000, \"protocol\": \"tcp\"}],
              \"essential\": true,
              \"secrets\": [
                {\"name\": \"gemini_api_key\",             \"valueFrom\": \"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:parameter/GEMINI_API_KEY\"},
                {\"name\": \"open_router_api_key\",        \"valueFrom\": \"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:parameter/OPEN_ROUTER_API_KEY\"},
                {\"name\": \"astra_db_api_endpoint\",      \"valueFrom\": \"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:parameter/ASTRA_DB_API_ENDPOINT\"},
                {\"name\": \"astra_db_application_token\", \"valueFrom\": \"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:parameter/ASTRA_DB_APPLICATION_TOKEN\"},
                {\"name\": \"astra_db_keyspace\",          \"valueFrom\": \"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:parameter/ASTRA_DB_KEYSPACE\"},
                {\"name\": \"astra_db_collection\",        \"valueFrom\": \"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:parameter/ASTRA_DB_COLLECTION\"},
                {\"name\": \"api_key\",                    \"valueFrom\": \"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:parameter/API_KEY\"}
              ],
              \"environment\": [
                {\"name\": \"redis_url\",   \"value\": \"redis://localhost:6379\"},
                {\"name\": \"environment\", \"value\": \"production\"},
                {\"name\": \"log_level\",   \"value\": \"INFO\"}
              ],
              \"logConfiguration\": {
                \"logDriver\": \"awslogs\",
                \"options\": {
                  \"awslogs-group\": \"${{ env.LOG_GROUP }}\",
                  \"awslogs-region\": \"${{ env.AWS_REGION }}\",
                  \"awslogs-stream-prefix\": \"ecs\"
                }
              }
            }]" \
            --region ${{ env.AWS_REGION }} \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)
          echo "task_def=$TASK_DEF" >> $GITHUB_OUTPUT
          echo "✅ Registered task: $TASK_DEF"

      - name: Create or update ECS service
        run: |
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query "services[0].status" \
            --output text)

          if [ "$SERVICE_STATUS" == "ACTIVE" ]; then
            echo "✅ Service exists — updating..."
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service ${{ env.ECS_SERVICE }} \
              --task-definition ${{ steps.register-task.outputs.task_def }} \
              --network-configuration "awsvpcConfiguration={subnets=[${{ env.SUBNET_ID }}],securityGroups=[${{ env.SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          else
            echo "🚀 Creating new service..."
            aws ecs create-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service-name ${{ env.ECS_SERVICE }} \
              --task-definition ${{ steps.register-task.outputs.task_def }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ env.SUBNET_ID }}],securityGroups=[${{ env.SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Wait for service stability
        run: |
          echo "⏳ Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Service is stable!"

      - name: Get public IP
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ${{ env.ECS_SERVICE }} \
            --query "taskArns[0]" \
            --output text)

          ENI=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASK_ARN \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" \
            --output text)

          IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI \
            --query "NetworkInterfaces[0].Association.PublicIp" \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "🚀 App deployed at: http://$IP:8000/docs"

      - name: Smoke test deployment
        run: |
          echo "🔍 Running smoke test..."
          sleep 15
          curl -f http://${{ steps.get-ip.outputs.ip }}:8000/health || exit 1
          echo "✅ Health check passed!"